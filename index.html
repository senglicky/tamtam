<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tam Tam Shoutbox (Auth)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #006b3f;
            --bg-light: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #94a3b8;
            --input-bg: #f8fafc;
            --border-radius: 24px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .background-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(203, 213, 225, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(203, 213, 225, 0.2) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .shoutbox-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .auth-header {
            padding: 12px 24px;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(241, 245, 249, 1);
            background: #fff;
        }

        .google-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 1px solid #e0e0e0;
            color: #3c4043;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .google-btn:hover {
            background: #f8f9fa;
        }

        .user-status {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .hidden {
            display: none !important;
        }

        .text-button {
            background: none;
            border: none;
            color: var(--primary-green);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .connecting-overlay {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            color: var(--text-muted);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(148, 163, 184, 0.1);
            border-top: 3px solid var(--text-muted);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .input-container {
            padding: 16px;
            background: #ffffff;
            border-top: 1px solid rgba(241, 245, 249, 1);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--input-bg);
            border-radius: 30px;
            padding: 6px 6px 6px 20px;
        }

        #messageInput {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
        }

        .send-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary-green);
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .send-icon {
            width: 20px;
            height: 20px;
            fill: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="background-grid"></div>
    <div class="shoutbox-container">
        <div class="auth-header" id="authHeader">
            <div id="userStatus" class="user-status hidden">
                <span id="userName">...</span>
                <button id="logoutButton" class="text-button">Uitloggen</button>
            </div>
            <button id="loginButton" class="google-btn">
                <svg width="18" height="18" viewBox="0 0 18 18">
                    <path
                        d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                        fill="#4285F4" />
                    <path
                        d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
                        fill="#34A853" />
                    <path
                        d="M3.964 10.705a5.41 5.41 0 0 1-.282-1.705c0-.6.102-1.183.282-1.705V4.963H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.037l3.007-2.332z"
                        fill="#FBBC05" />
                    <path
                        d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.48 0 2.443 2.048.957 4.963L3.964 7.296C4.672 5.169 6.656 3.58 9 3.58z"
                        fill="#EA4335" />
                </svg>
                Inloggen met Google
            </button>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="connecting-overlay" id="connectingOverlay">
                <div class="spinner"></div>
                <p>Verbinding maken...</p>
            </div>
        </div>
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Bericht..." autocomplete="off" disabled>
                <button id="sendButton" class="send-button">
                    <svg viewBox="0 0 24 24" class="send-icon">
                        <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const supabaseUrl = 'https://qjzftprfqhwmzjfodscp.supabase.co';
        const supabaseAnonKey = 'sb_publishable_5WESGI70ACvNrZ4dR1hVoA_65uLmNZ8';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

        const connectingOverlay = document.getElementById('connectingOverlay');
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const loginButton = document.getElementById('loginButton');
        const logoutButton = document.getElementById('logoutButton');
        const userStatus = document.getElementById('userStatus');
        const userNameDisplay = document.getElementById('userName');

        let currentUser = null;
        let messageCount = 0;
        const MAX_VISIBLE_MESSAGES = 50;
        const PAGINATION_INTERVAL = 50;

        const loadMoreBtn = document.createElement('button');
        loadMoreBtn.style.cssText = 'display: none; margin: 0 auto 20px auto; font-size: 13px; color: #64748b; background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 20px; cursor: pointer;';
        loadMoreBtn.textContent = 'Oudere berichten laden...';
        chatArea.prepend(loadMoreBtn);

        const appendMessageUI = (text, sender = 'Anonymous', timestamp = null, prepend = false) => {
            const messageEl = document.createElement('div');
            messageEl.className = 'message-bubble';
            messageEl.style.cssText = 'align-self: stretch; width: 100%; background: #f1f5f9; padding: 14px 18px; border-radius: 12px; margin-bottom: 16px; font-size: 14px; color: #334155; animation: slideIn 0.3s ease-out; box-shadow: 0 1px 2px rgba(0,0,0,0.03);';

            let timeStr = '';
            if (timestamp) {
                const date = new Date(timestamp);
                timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' ' + date.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
            } else {
                const now = new Date();
                timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' ' + now.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
            }

            messageEl.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 4px;">
                        <div style="font-size: 11px; color: var(--primary-green); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">${sender}</div>
                        <div style="font-size: 10px; color: #94a3b8; white-space: nowrap;">${timeStr}</div>
                    </div>
                    <div style="line-height: 1.6; word-wrap: break-word;">${text}</div>
                `;

            if (prepend) {
                if (loadMoreBtn.nextSibling) chatArea.insertBefore(messageEl, loadMoreBtn.nextSibling);
                else chatArea.appendChild(messageEl);
            } else {
                chatArea.appendChild(messageEl);
                messageCount++;
                if (messageCount > MAX_VISIBLE_MESSAGES) {
                    const bubbles = chatArea.querySelectorAll('.message-bubble');
                    if (bubbles.length > MAX_VISIBLE_MESSAGES) {
                        bubbles[0].remove();
                        messageCount--;
                        loadMoreBtn.style.display = 'block';
                    }
                }
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        };

        const fetchMessages = async (offset = 0) => {
            const limit = offset === 0 ? MAX_VISIBLE_MESSAGES : PAGINATION_INTERVAL;
            try {
                const { data, error } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false }).range(offset, offset + limit - 1);

                if (error) throw error;

                if (offset === 0) {
                    connectingOverlay.style.display = 'none';
                    chatArea.querySelectorAll('.message-bubble').forEach(b => b.remove());
                    messageCount = 0;
                    if (data && data.length > 0) {
                        [...data].reverse().forEach(msg => appendMessageUI(msg.content, msg.user_name, msg.created_at));
                        if (data.length === MAX_VISIBLE_MESSAGES) loadMoreBtn.style.display = 'block';
                    }
                } else {
                    if (data && data.length > 0) {
                        data.forEach(msg => appendMessageUI(msg.content, msg.user_name, msg.created_at, true));
                        if (data.length < PAGINATION_INTERVAL) loadMoreBtn.style.display = 'none';
                    } else loadMoreBtn.style.display = 'none';
                }
            } catch (err) {
                console.error('Fetch error:', err);
                connectingOverlay.innerHTML = `
                        <div style="color: #ef4444; padding: 20px; text-align: center;">
                            <p style="font-weight: 600; margin-bottom: 8px;">Fout bij laden van berichten</p>
                            <p style="font-size: 12px; margin-bottom: 12px;">${err.message}</p>
                            <p style="font-size: 11px; color: #64748b;">Als je net de 'user_email' kolom hebt toegevoegd, moet je waarschijnlijk de <b>Supabase schema cache</b> verversen met:<br><code>NOTIFY pgrst, 'reload schema';</code></p>
                        </div>
                    `;
            }
        };

        const sendMessage = async () => {
            if (!currentUser) return;
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';
            messageInput.disabled = true;

            try {
                const { error } = await supabaseClient.from('messages').insert([{
                    content: text,
                    user_name: currentUser.user_metadata.full_name || currentUser.email,
                    user_email: currentUser.email
                }]);
                if (error) throw error;
            } catch (err) {
                console.error('Send error:', err);
                alert('Fout bij verzenden: ' + err.message);
                messageInput.value = text;
            } finally {
                messageInput.disabled = false;
                messageInput.focus();
            }
        };

        const updateAuthUI = (user) => {
            currentUser = user;
            if (user) {
                loginButton.classList.add('hidden');
                userStatus.classList.remove('hidden');
                userNameDisplay.textContent = user.user_metadata.full_name || user.email;
                messageInput.disabled = false;
                messageInput.placeholder = "Typ een bericht...";
            } else {
                loginButton.classList.remove('hidden');
                userStatus.classList.add('hidden');
                messageInput.disabled = true;
                messageInput.placeholder = "Log in om te chatten...";
            }
        };

        supabaseClient.auth.onAuthStateChange((event, session) => updateAuthUI(session?.user ?? null));
        const { data: { session } } = await supabaseClient.auth.getSession();
        updateAuthUI(session?.user ?? null);

        await fetchMessages();
        supabaseClient.channel('public:messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => appendMessageUI(p.new.content, p.new.user_name, p.new.created_at)).subscribe();

        loadMoreBtn.addEventListener('click', async () => {
            const offset = chatArea.querySelectorAll('.message-bubble').length;
            loadMoreBtn.textContent = 'Laden...';
            await fetchMessages(offset);
            loadMoreBtn.textContent = 'Oudere berichten laden...';
        });
        loginButton.addEventListener('click', () => supabaseClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } }));
        logoutButton.addEventListener('click', () => supabaseClient.auth.signOut());
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
